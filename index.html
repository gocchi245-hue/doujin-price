<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同人価格.com - FANZA×DLsite 価格比較</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #f7f6f3; color: #1a1a1a; }

header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.logo { font-size: 20px; font-weight: 700; }
.logo span { color: #e53935; }
.logo-sub { font-size: 12px; font-weight: 400; color: #aaa; margin-left: 8px; }
.header-note { font-size: 11px; color: #bbb; }

.main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 20px; }
.stat { background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 12px 14px; }
.stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-val.red { color: #e53935; }
.stat-val.blue { color: #1976d2; }
.stat-val.green { color: #2e7d32; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 7px 14px; font-size: 13px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; color: #555; }
.tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.note { font-size: 12px; color: #bbb; margin-bottom: 14px; padding: 8px 12px; border-left: 3px solid #e0e0e0; background: #fafafa; border-radius: 0 6px 6px 0; }

.card-list { display: flex; flex-direction: column; gap: 10px; }
.card { background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 18px 20px; transition: border-color 0.15s; }
.card:hover { border-color: #ccc; }

.card-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
.rank { font-size: 20px; font-weight: 800; min-width: 30px; text-align: center; padding-top: 2px; color: #ccc; }
.rank.r1 { color: #f9a825; }
.rank.r2 { color: #90a4ae; }
.rank.r3 { color: #a1887f; }
.thumb { width: 56px; height: 56px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.circle { font-size: 12px; color: #888; }
.genre { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0f0f0; color: #555; }
.sale-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #fff3e0; color: #e65100; font-weight: 600; }

.price-compare { display: flex; gap: 0; border: 1px solid #ececec; border-radius: 10px; overflow: hidden; }
.price-side { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.price-side.fanza { background: #fff5f5; }
.price-side.dlsite { background: #f0f4ff; }
.price-side.winner { position: relative; }
.price-side.winner::after { content: '✓ 安い'; position: absolute; top: 6px; right: 8px; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
.price-side.fanza.winner::after { background: #ffcdd2; color: #c62828; }
.price-side.dlsite.winner::after { background: #bbdefb; color: #1565c0; }
.price-side.fanza.no-data { background: #fafafa; }
.price-site { font-size: 12px; font-weight: 600; color: #888; }
.price-site.fanza { color: #e53935; }
.price-site.dlsite { color: #1976d2; }
.price-num { font-size: 20px; font-weight: 800; }
.price-num.fanza { color: #e53935; }
.price-num.dlsite { color: #1976d2; }
.price-num.na { color: #ccc; font-size: 14px; font-weight: 400; }
.price-orig { font-size: 12px; color: #bbb; text-decoration: line-through; }
.vs-divider { display: flex; align-items: center; background: #f9f9f9; padding: 0 8px; font-size: 12px; font-weight: 700; color: #ccc; }

.buy-area { margin-top: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.buy-link { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.15s; }
.buy-link.fanza { background: #e53935; color: #fff; }
.buy-link.fanza:hover { background: #c62828; }
.buy-link.dlsite { background: #1976d2; color: #fff; }
.buy-link.dlsite:hover { background: #1565c0; }
.save-badge { font-size: 13px; font-weight: 600; color: #2e7d32; background: #e8f5e9; padding: 6px 14px; border-radius: 8px; }
.same-badge { font-size: 13px; color: #888; background: #f5f5f5; padding: 6px 14px; border-radius: 8px; }

.loading { text-align: center; padding: 60px 0; }
.spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #e53935; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 14px; color: #888; }

.empty { text-align: center; padding: 60px 0; color: #aaa; font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

.rating { font-size: 12px; color: #f9a825; margin-left: 4px; }

.footer { text-align: center; padding: 32px 0; font-size: 12px; color: #bbb; line-height: 1.8; }

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(3, 1fr); }
  .price-compare { flex-direction: column; }
  .vs-divider { justify-content: center; padding: 4px 0; }
  .buy-area { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <span class="logo">同人価格<span>.com</span></span>
      <span class="logo-sub">FANZA × DLsite 価格比較</span>
    </div>
    <div class="header-note" id="updatedAt">読み込み中...</div>
  </div>
</header>

<div class="main">
  <div class="stats" id="stats"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="all">すべて</button>
    <button class="tab" data-tab="fanza">FANZA安い</button>
    <button class="tab" data-tab="dlsite">DLsite安い</button>
    <button class="tab" data-tab="sale">セール中</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>データを読み込んでいます…</p>
    </div>
  </div>
</div>

<div class="footer">
  ※ 価格は税込表示です。最新の価格は各販売サイトでご確認ください。<br>
  ※ データは毎日自動更新されます（GitHub Actions）<br>
  同人価格.com はFANZA・DLsiteのアフィリエイトプログラムに参加しています。
</div>

<script>
let allItems = [];
let currentTab = 'all';

// タブ
document.getElementById('tabs').onclick = e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  renderList();
};

// データ読み込み
async function loadData() {
  try {
    const res = await fetch('data.json?' + Date.now());
    if (!res.ok) throw new Error('data.json が見つかりません');
    const data = await res.json();

    document.getElementById('updatedAt').textContent = `最終更新: ${data.updatedAt || '不明'}`;
    allItems = data.items || [];

    renderStats();
    renderList();
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>データの読み込みに失敗しました。<br>GitHub Actionsが初回実行されるまでお待ちください。</p>
      </div>`;
    document.getElementById('updatedAt').textContent = 'データ未取得';
  }
}

function renderStats() {
  const withBoth = allItems.filter(i => i.fanzaPrice != null && i.price != null);
  const fanzaWin = withBoth.filter(i => i.fanzaPrice < i.price).length;
  const dlsiteWin = withBoth.filter(i => i.price < i.fanzaPrice).length;
  const same = withBoth.filter(i => i.price === i.fanzaPrice).length;
  const avgDiff = withBoth.length > 0
    ? Math.round(withBoth.reduce((s,i) => s + Math.abs((i.fanzaPrice||0) - i.price), 0) / withBoth.length)
    : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">取得作品数</div><div class="stat-val">${allItems.length}</div></div>
    <div class="stat"><div class="stat-label">価格比較可能</div><div class="stat-val">${withBoth.length}</div></div>
    <div class="stat"><div class="stat-label">FANZA安い</div><div class="stat-val red">${fanzaWin}</div></div>
    <div class="stat"><div class="stat-label">DLsite安い</div><div class="stat-val blue">${dlsiteWin}</div></div>
    <div class="stat"><div class="stat-label">平均差額</div><div class="stat-val green">¥${avgDiff}</div></div>`;
}

function renderList() {
  let data = allItems.filter(i => {
    if (currentTab === 'fanza') return i.fanzaPrice != null && i.fanzaPrice < i.price;
    if (currentTab === 'dlsite') return i.fanzaPrice != null && i.price < i.fanzaPrice;
    if (currentTab === 'sale') return i.isOnSale;
    return true;
  });

  if (!data.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <p>該当する作品が見つかりませんでした</p>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = `<div class="card-list">${data.map(i => {
    const dlPrice = i.price || 0;
    const fzPrice = i.fanzaPrice;
    const hasBoth = fzPrice != null && fzPrice > 0;

    let cheaper = 'none';
    let diff = 0;
    if (hasBoth) {
      if (fzPrice < dlPrice) { cheaper = 'fanza'; diff = dlPrice - fzPrice; }
      else if (dlPrice < fzPrice) { cheaper = 'dlsite'; diff = fzPrice - dlPrice; }
      else { cheaper = 'same'; }
    }

    // 購入リンク
    let buyHtml = '';
    if (cheaper === 'fanza') {
      buyHtml = `
        <a href="${i.fanzaUrl}" target="_blank" rel="noopener noreferrer" class="buy-link fanza">→ FANZAから購入</a>
        <span class="save-badge">¥${diff.toLocaleString()} お得！</span>`;
    } else if (cheaper === 'dlsite') {
      buyHtml = `
        <a href="${i.dlsiteUrl}" target="_blank" rel="noopener noreferrer" class="buy-link dlsite">→ DLsiteから購入</a>
        <span class="save-badge">¥${diff.toLocaleString()} お得！</span>`;
    } else if (cheaper === 'same') {
      buyHtml = `
        <a href="${i.dlsiteUrl}" target="_blank" rel="noopener noreferrer" class="buy-link dlsite">→ DLsiteで見る</a>
        ${i.fanzaUrl ? `<a href="${i.fanzaUrl}" target="_blank" rel="noopener noreferrer" class="buy-link fanza">→ FANZAで見る</a>` : ''}
        <span class="same-badge">同一価格</span>`;
    } else {
      // FANZA価格なし → DLsiteのみ
      buyHtml = `
        <a href="${i.dlsiteUrl}" target="_blank" rel="noopener noreferrer" class="buy-link dlsite">→ DLsiteで見る</a>`;
    }

    return `
    <div class="card">
      <div class="card-top">
        <div class="rank ${i.rank<=3?'r'+i.rank:''}">${i.rank}</div>
        <div class="thumb">${i.emoji || '📄'}</div>
        <div class="card-info">
          <div class="card-title">
            ${i.title}
            ${i.isOnSale ? '<span class="sale-tag">SALE</span>' : ''}
            ${i.rating ? `<span class="rating">★${i.rating}</span>` : ''}
          </div>
          <div class="card-meta">
            <span class="circle">${i.circle}</span>
            <span class="genre">${i.genre}</span>
            ${(i.tags || []).slice(0, 2).map(t => `<span class="genre">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="price-compare">
        <div class="price-side fanza ${cheaper==='fanza'?'winner':''} ${!hasBoth?'no-data':''}">
          <span class="price-site fanza">FANZA</span>
          ${hasBoth
            ? `<span class="price-num fanza">¥${fzPrice.toLocaleString()}</span>`
            : `<span class="price-num na">API連携待ち</span>`}
        </div>
        <div class="vs-divider">VS</div>
        <div class="price-side dlsite ${cheaper==='dlsite'?'winner':''}">
          <span class="price-site dlsite">DLsite</span>
          <span class="price-num dlsite">¥${dlPrice.toLocaleString()}</span>
          ${i.originalPrice ? `<span class="price-orig">¥${i.originalPrice.toLocaleString()}</span>` : ''}
        </div>
      </div>
      <div class="buy-area">${buyHtml}</div>
    </div>`;
  }).join('')}</div>`;
}

loadData();
</script>
</body>
</html>
