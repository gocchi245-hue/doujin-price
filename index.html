<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同人価格.com - FANZA×DLsite 価格比較</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #f7f6f3; color: #1a1a1a; }

header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.logo { font-size: 20px; font-weight: 700; }
.logo span { color: #e53935; }
.logo-sub { font-size: 12px; font-weight: 400; color: #aaa; margin-left: 8px; }
.header-note { font-size: 11px; color: #bbb; }

.main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

/* タブ */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
.tab { flex: 1; padding: 14px 0; font-size: 15px; font-weight: 700; text-align: center; cursor: pointer; border: none; background: #fff; color: #888; transition: all 0.2s; }
.tab.fanza.active { background: #e53935; color: #fff; }
.tab.dlsite.active { background: #1976d2; color: #fff; }
.tab:not(.active):hover { background: #f5f5f5; }

/* 統計 */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 20px; }
.stat { background: #fff; border: 1px solid #ececec; border-radius: 10px; padding: 12px 14px; }
.stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-val.red { color: #e53935; }
.stat-val.blue { color: #1976d2; }
.stat-val.green { color: #2e7d32; }

/* カード */
.card-list { display: flex; flex-direction: column; gap: 10px; }
.card { background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 18px 20px; transition: border-color 0.15s; }
.card:hover { border-color: #ccc; }

.card-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
.rank { font-size: 20px; font-weight: 800; min-width: 30px; text-align: center; padding-top: 2px; color: #ccc; }
.rank.r1 { color: #f9a825; }
.rank.r2 { color: #90a4ae; }
.rank.r3 { color: #a1887f; }
.thumb { width: 56px; height: 56px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.circle { font-size: 12px; color: #888; }
.genre { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0f0f0; color: #555; }

/* 価格比較 */
.price-compare { display: flex; gap: 0; border: 1px solid #ececec; border-radius: 10px; overflow: hidden; }
.price-side { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.price-side.fanza { background: #fff5f5; }
.price-side.dlsite { background: #f0f4ff; }
.price-side.main-side { position: relative; }
.price-side.main-side::before { content: '▶ ランキング元'; position: absolute; top: 4px; left: 8px; font-size: 9px; font-weight: 600; color: #aaa; }
.price-side.winner { position: relative; }
.price-side.winner::after { content: '✓ 安い'; position: absolute; top: 4px; right: 8px; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
.price-side.fanza.winner::after { background: #ffcdd2; color: #c62828; }
.price-side.dlsite.winner::after { background: #bbdefb; color: #1565c0; }
.price-site { font-size: 12px; font-weight: 600; }
.price-site.fanza { color: #e53935; }
.price-site.dlsite { color: #1976d2; }
.price-num { font-size: 20px; font-weight: 800; }
.price-num.fanza { color: #e53935; }
.price-num.dlsite { color: #1976d2; }
.price-num.na { color: #ccc; font-size: 13px; font-weight: 400; }
.vs-divider { display: flex; align-items: center; background: #f9f9f9; padding: 0 8px; font-size: 12px; font-weight: 700; color: #ccc; }

/* 購入リンク */
.buy-area { margin-top: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.buy-link { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.15s; }
.buy-link.fanza { background: #e53935; color: #fff; }
.buy-link.fanza:hover { background: #c62828; }
.buy-link.dlsite { background: #1976d2; color: #fff; }
.buy-link.dlsite:hover { background: #1565c0; }
.save-badge { font-size: 13px; font-weight: 600; color: #2e7d32; background: #e8f5e9; padding: 6px 14px; border-radius: 8px; }
.same-badge { font-size: 13px; color: #888; background: #f5f5f5; padding: 6px 14px; border-radius: 8px; }

.loading { text-align: center; padding: 60px 0; }
.spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #e53935; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 14px; color: #888; }

.empty { text-align: center; padding: 60px 0; color: #aaa; font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

.footer { text-align: center; padding: 32px 0; font-size: 12px; color: #bbb; line-height: 1.8; }

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .price-compare { flex-direction: column; }
  .vs-divider { justify-content: center; padding: 4px 0; }
  .buy-area { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <span class="logo">同人価格<span>.com</span></span>
      <span class="logo-sub">FANZA × DLsite 価格比較</span>
    </div>
    <div class="header-note" id="updatedAt">読み込み中...</div>
  </div>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab fanza active" data-tab="fanza">FANZA ランキング</button>
    <button class="tab dlsite" data-tab="dlsite">DLsite ランキング</button>
  </div>

  <div class="stats" id="stats"></div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>データを読み込んでいます…</p>
    </div>
  </div>
</div>

<div class="footer">
  ※ 価格は税込表示です。最新の価格は各販売サイトでご確認ください。<br>
  ※ DLsiteランキングは毎日自動更新（GitHub Actions）<br>
  同人価格.com はFANZA・DLsiteのアフィリエイトプログラムに参加しています。
</div>

<script>
let data = {};
let currentTab = 'fanza';

// タブ切替
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderStats();
    renderList();
  };
});

async function loadData() {
  try {
    const res = await fetch('data.json?' + Date.now());
    if (!res.ok) throw new Error('data.json が見つかりません');
    data = await res.json();
    document.getElementById('updatedAt').textContent = `最終更新: ${data.updatedAt || '不明'}`;
    renderStats();
    renderList();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="empty"><div class="empty-icon">⚠️</div>
      <p>データの読み込みに失敗しました。</p></div>`;
  }
}

function renderStats() {
  const items = currentTab === 'fanza' ? (data.fanzaItems || []) : (data.dlsiteItems || []);
  const withRival = items.filter(i => i.rivalPrice != null && i.rivalPrice > 0);
  const thisWin = withRival.filter(i => i.price < i.rivalPrice).length;
  const rivalWin = withRival.filter(i => i.rivalPrice < i.price).length;
  const same = withRival.filter(i => i.price === i.rivalPrice).length;
  const rivalName = currentTab === 'fanza' ? 'DLsite' : 'FANZA';
  const thisName = currentTab === 'fanza' ? 'FANZA' : 'DLsite';

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">${thisName}ランキング</div><div class="stat-val">${items.length}件</div></div>
    <div class="stat"><div class="stat-label">比較可能</div><div class="stat-val">${withRival.length}件</div></div>
    <div class="stat"><div class="stat-label">${thisName}安い</div><div class="stat-val ${currentTab === 'fanza' ? 'red' : 'blue'}">${thisWin}</div></div>
    <div class="stat"><div class="stat-label">${rivalName}安い</div><div class="stat-val ${currentTab === 'fanza' ? 'blue' : 'red'}">${rivalWin}</div></div>
    <div class="stat"><div class="stat-label">同価格</div><div class="stat-val">${same}</div></div>`;
}

function renderList() {
  const items = currentTab === 'fanza' ? (data.fanzaItems || []) : (data.dlsiteItems || []);
  const isFanza = currentTab === 'fanza';
  const rivalName = isFanza ? 'DLsite' : 'FANZA';

  if (!items.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty"><div class="empty-icon">📦</div>
      <p>${isFanza ? 'FANZAデータが未入力です。fanza_manual.txt にデータを入力してください。' : 'DLsiteデータがありません。'}</p></div>`;
    return;
  }

  document.getElementById('content').innerHTML = `<div class="card-list">${items.map(i => {
    const myPrice = i.price || 0;
    const rivalPrice = i.rivalPrice;
    const hasRival = rivalPrice != null && rivalPrice > 0;

    let cheaper = 'none';
    let diff = 0;
    if (hasRival) {
      if (myPrice < rivalPrice) { cheaper = 'self'; diff = rivalPrice - myPrice; }
      else if (rivalPrice < myPrice) { cheaper = 'rival'; diff = myPrice - rivalPrice; }
      else { cheaper = 'same'; }
    }

    // 購入リンク
    let buyHtml = '';
    if (cheaper === 'self') {
      buyHtml = `
        <a href="${i.url}" target="_blank" rel="noopener noreferrer" class="buy-link ${isFanza ? 'fanza' : 'dlsite'}">→ ${isFanza ? 'FANZA' : 'DLsite'}から購入</a>
        <span class="save-badge">¥${diff.toLocaleString()} お得！</span>`;
    } else if (cheaper === 'rival') {
      buyHtml = `
        <a href="${i.rivalUrl}" target="_blank" rel="noopener noreferrer" class="buy-link ${isFanza ? 'dlsite' : 'fanza'}">→ ${rivalName}から購入</a>
        <span class="save-badge">¥${diff.toLocaleString()} お得！</span>`;
    } else if (cheaper === 'same') {
      buyHtml = `
        <a href="${i.url}" target="_blank" rel="noopener noreferrer" class="buy-link ${isFanza ? 'fanza' : 'dlsite'}">→ ${isFanza ? 'FANZA' : 'DLsite'}で見る</a>
        <a href="${i.rivalUrl}" target="_blank" rel="noopener noreferrer" class="buy-link ${isFanza ? 'dlsite' : 'fanza'}">→ ${rivalName}で見る</a>
        <span class="same-badge">同価格</span>`;
    } else {
      buyHtml = `<a href="${i.url}" target="_blank" rel="noopener noreferrer" class="buy-link ${isFanza ? 'fanza' : 'dlsite'}">→ ${isFanza ? 'FANZA' : 'DLsite'}で見る</a>`;
    }

    const rankClass = i.rank <= 3 ? 'r' + i.rank : '';

    return `
    <div class="card">
      <div class="card-top">
        <div class="rank ${rankClass}">${i.rank}</div>
        <div class="thumb">${i.emoji || '📄'}</div>
        <div class="card-info">
          <div class="card-title">${i.title}</div>
          <div class="card-meta">
            ${i.circle ? `<span class="circle">${i.circle}</span>` : ''}
            ${i.genre ? `<span class="genre">${i.genre}</span>` : ''}
            ${(i.tags || []).slice(0, 2).map(t => `<span class="genre">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="price-compare">
        <div class="price-side fanza ${isFanza ? 'main-side' : ''} ${(isFanza && cheaper==='self') || (!isFanza && cheaper==='rival') ? 'winner' : ''}">
          <span class="price-site fanza">FANZA</span>
          ${isFanza
            ? `<span class="price-num fanza">¥${myPrice.toLocaleString()}</span>`
            : (hasRival ? `<span class="price-num fanza">¥${rivalPrice.toLocaleString()}</span>` : `<span class="price-num na">該当なし</span>`)}
        </div>
        <div class="vs-divider">VS</div>
        <div class="price-side dlsite ${!isFanza ? 'main-side' : ''} ${(!isFanza && cheaper==='self') || (isFanza && cheaper==='rival') ? 'winner' : ''}">
          <span class="price-site dlsite">DLsite</span>
          ${!isFanza
            ? `<span class="price-num dlsite">¥${myPrice.toLocaleString()}</span>`
            : (hasRival ? `<span class="price-num dlsite">¥${rivalPrice.toLocaleString()}</span>` : `<span class="price-num na">該当なし</span>`)}
        </div>
      </div>
      <div class="buy-area">${buyHtml}</div>
    </div>`;
  }).join('')}</div>`;
}

loadData();
</script>
</body>
</html>
